name: build
on: [push, pull_request]
jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # - ruby: "4.0"
          #   os: ubuntu-24.04
          #   valgrind: true
          - ruby: 3.4
            os: macos-26
          # - ruby: 3.3
          #   os: ubuntu-24.04
          # - ruby: 3.2
          #   os: ubuntu-22.04
    env:
      LIBTORCH_VERSION: 2.11.0
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - uses: actions/cache@v5
        with:
          path: ~/libtorch
          key: ${{ runner.os }}-libtorch-${{ env.LIBTORCH_VERSION }}
        id: cache-libtorch
      - name: Download LibTorch
        if: steps.cache-libtorch.outputs.cache-hit != 'true'
        run: |
          cd ~
          wget -q -O libtorch.zip https://download.pytorch.org/libtorch/cpu/${{ runner.os == 'Linux' && 'libtorch-shared-with-deps-$LIBTORCH_VERSION%2Bcpu.zip' || 'libtorch-macos-arm64-$LIBTORCH_VERSION.zip' }}
          unzip -q libtorch.zip
      - run: MAKE="make -j$(getconf _NPROCESSORS_ONLN)" bundle exec rake compile -- --with-torch-dir=$HOME/libtorch
      - run: otool -L $HOME/libtorch/lib/libtorch_cpu.dylib
      - run: otool -L lib/torch/ext.bundle
      - run: bundle exec rake test

      - if: ${{ matrix.valgrind }}
        run: |
          sudo apt-get update && sudo apt-get install valgrind
          bundle exec rake test:valgrind
